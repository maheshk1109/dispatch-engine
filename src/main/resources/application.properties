spring.application.name=dispatch-engine
server.port=8082

spring.cloud.aws.region.static=ap-southeast-2

# SQS — consume from order-hub outbox
aws.sqs.dispatch-queue=dispatch-orders

# SNS — publish dispatch events to alert-engine
aws.sns.dispatch-topic-arn=arn:aws:sns:ap-southeast-2:984454382434:dispatch-events

# DynamoDB
aws.dynamodb.table-name=dispatch-engine-assignments

# External driver API — we wrap with circuit breaker
aws.driver-api.url=https://driver-api.lastmile.internal

# Resilience4j — Circuit Breaker
resilience4j.circuitbreaker.instances.driverApi.slidingWindowSize=10
resilience4j.circuitbreaker.instances.driverApi.failureRateThreshold=50
resilience4j.circuitbreaker.instances.driverApi.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.driverApi.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.driverApi.automaticTransitionFromOpenToHalfOpenEnabled=true

# Resilience4j — Retry
resilience4j.retry.instances.driverApi.maxAttempts=3
resilience4j.retry.instances.driverApi.waitDuration=500ms
resilience4j.retry.instances.driverApi.enableExponentialBackoff=true
resilience4j.retry.instances.driverApi.exponentialBackoffMultiplier=2

# Resilience4j — Bulkhead (limit concurrent calls to driver API)
resilience4j.bulkhead.instances.driverApi.maxConcurrentCalls=10
resilience4j.bulkhead.instances.driverApi.maxWaitDuration=100ms
